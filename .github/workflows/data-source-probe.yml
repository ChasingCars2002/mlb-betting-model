name: Data Source Probe

# Temporary diagnostic: from a GitHub runner IP, test which MLB data sources
# are reachable, to decide how to replace the FanGraphs feed (which 403s here).
# Push-triggered because the MCP integration cannot dispatch workflows.

on:
  push:
    branches: [ "claude/predictions-not-posting-KIVES" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Probe candidate data sources
        run: |
          python - <<'PY'
          import requests, traceback
          from datetime import date
          season = date.today().year
          UA = ("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 "
                "(KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36")

          def probe(label, fn):
              try:
                  print(f"{label}: {fn()}")
              except Exception as e:
                  print(f"{label}: FAIL {type(e).__name__}: {e}")

          # 1. MLB Stats API — team pitching season stats (NYY=147)
          def mlb_team_pitching():
              u=f"https://statsapi.mlb.com/api/v1/teams/147/stats?season={season}&group=pitching&stats=season"
              r=requests.get(u,timeout=25); r.raise_for_status()
              d=r.json(); splits=d["stats"][0]["splits"][0]["stat"]
              return f"OK era={splits.get('era')} whip={splits.get('whip')} so={splits.get('strikeOuts')}"
          probe("MLB-StatsAPI team pitching", mlb_team_pitching)

          # 2. MLB Stats API — team hitting season stats
          def mlb_team_hitting():
              u=f"https://statsapi.mlb.com/api/v1/teams/147/stats?season={season}&group=hitting&stats=season"
              r=requests.get(u,timeout=25); r.raise_for_status()
              s=r.json()["stats"][0]["splits"][0]["stat"]
              return f"OK ops={s.get('ops')} avg={s.get('avg')} runs={s.get('runs')}"
          probe("MLB-StatsAPI team hitting", mlb_team_hitting)

          # 3. MLB Stats API — individual pitcher season stats (Gerrit Cole=543037)
          def mlb_player_pitching():
              u=f"https://statsapi.mlb.com/api/v1/people/543037/stats?stats=season&group=pitching&season={season}"
              r=requests.get(u,timeout=25); r.raise_for_status()
              sp=r.json()["stats"][0]["splits"]
              return "OK has-data" if sp else "OK but empty (no 2026 data)"
          probe("MLB-StatsAPI pitcher", mlb_player_pitching)

          # 4. Baseball Savant (Statcast) reachability
          def savant():
              u=(f"https://baseballsavant.mlb.com/leaderboard/custom?year={season}"
                 "&type=pitcher&min=q&selections=xwoba&csv=true")
              r=requests.get(u,headers={"User-Agent":UA},timeout=30)
              return f"status={r.status_code} bytes={len(r.content)}"
          probe("Baseball Savant", savant)

          # 5. Baseball-Reference via pybaseball
          def bref():
              import pybaseball
              df=pybaseball.pitching_stats_bref(season)
              return f"OK rows={len(df)}"
          probe("BBRef pitching_stats_bref", bref)

          # 6. FanGraphs NEW json api (vs the legacy aspx that 403s)
          def fg_new():
              u="https://www.fangraphs.com/api/leaders/major-league/data"
              p={"pos":"all","stats":"pit","lg":"all","qual":"y","type":"8",
                 "season":season,"season1":season,"month":"0","ind":"0","pageitems":"30"}
              r=requests.get(u,params=p,headers={"User-Agent":UA},timeout=30)
              return f"status={r.status_code} bytes={len(r.content)}"
          probe("FanGraphs new JSON API", fg_new)
          PY
