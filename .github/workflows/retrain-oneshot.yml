name: One-shot Retrain (MLB data)

# One-time full retrain on the new MLB Stats API features, committed back to the
# branch. Push-triggered (API dispatch is blocked). Remove after it has run.
# A commit made here uses GITHUB_TOKEN, which does not re-trigger this workflow.

on:
  push:
    branches: [ "claude/predictions-not-posting-KIVES" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Full retrain on MLB Stats API features
        run: python main.py --train

      - name: Verify picks generate with the retrained model (no posting)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python - <<'PY'
          import logging; logging.basicConfig(level=logging.WARNING)
          from datetime import date, timedelta
          from data import get_todays_games
          from features import build_game_features
          from model import load_model, predict_win_prob
          from odds import fetch_live_odds, match_odds_to_games
          from evaluate import filter_positive_ev, filter_totals_ev
          from score import predict_game_scores

          model = load_model("xgboost")
          games = []
          for off in range(4):
              games = get_todays_games(date.today() + timedelta(days=off))
              if games:
                  break
          print(f"Games: {len(games)}")
          for g in games:
              f = build_game_features(g)
              g["model_prob"] = predict_win_prob(model, f) if f else 0.5
              try:
                  sc = predict_game_scores(f or {})
                  g["predicted_total"] = sc["predicted_total"]
                  g["predicted_home_runs"] = sc["predicted_home_score"]
                  g["predicted_away_runs"] = sc["predicted_away_score"]
              except Exception:
                  g["predicted_total"] = None
          probs = [g["model_prob"] for g in games]
          print(f"model_prob range: {min(probs):.3f}..{max(probs):.3f} (not all 0.5 => real signal)")
          odds = fetch_live_odds()
          gwo = match_odds_to_games(odds, games) if odds else []
          ml = filter_positive_ev(gwo)
          tot = filter_totals_ev(gwo)
          print(f"+EV moneyline picks: {len(ml)} | totals picks: {len(tot)}")
          for p in ml[:5]:
              print(f"  ML {p['away_team']}@{p['home_team']} {p['pick']} edge=+{p['edge']:.1%} ev={p['ev']:+.1%}")
          PY

      - name: Commit retrained models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/*.joblib models/training_state.json
          git diff --cached --quiet || git commit -m "chore: retrain models on MLB Stats API features $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3 4; do
            git pull --rebase -X ours origin claude/predictions-not-posting-KIVES && \
            git push origin HEAD:claude/predictions-not-posting-KIVES && break
            echo "push attempt $attempt failed"; sleep $((attempt*2))
          done
