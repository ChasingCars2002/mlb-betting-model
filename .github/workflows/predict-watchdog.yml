name: Predictions Watchdog

# Safety net for the Daily Predictions workflow. GitHub `schedule` crons are
# best-effort and can be delayed for hours or dropped entirely, so even the
# redundant predict triggers can all miss (this happened on 2026-06-10). This
# watchdog runs after the last predict attempt, checks whether today's picks
# actually posted (via docs/data/predict_status.json), and if not it runs the
# pipeline itself and reports the outcome to Discord. It needs no PAT or
# external service: it self-heals in-process rather than trying to re-dispatch
# a workflow (which the built-in GITHUB_TOKEN is not permitted to do).

on:
  schedule:
    # Multiple crons because the watchdog itself is subject to the same 2-3h
    # scheduler delays/drops it guards against. When healthy, each extra run
    # is just a checkout + marker check (a few seconds).
    - cron: '11 17 * * *'   # ~13:11 ET — after the 12:19 ET last-chance predict run
    - cron: '47 18 * * *'   # ~14:47 ET — backup sweep
    - cron: '29 20 * * *'   # ~16:29 ET — final sweep before evening games
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check whether predictions already posted today
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          MARKER=$(python3 -c "import json;print(json.load(open('docs/data/predict_status.json')).get('date',''))" 2>/dev/null || echo "")
          if [ "$MARKER" = "$TODAY" ]; then
            echo "Predictions already posted for $TODAY — watchdog healthy, nothing to do."
            echo "posted=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No predictions for $TODAY (marker='$MARKER') — scheduled runs missed; self-healing."
            echo "posted=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.check.outputs.posted == 'false'
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Restore feature cache
        if: steps.check.outputs.posted == 'false'
        uses: actions/cache@v5
        with:
          path: models/cache
          key: feature-cache-${{ hashFiles('features.py') }}
          restore-keys: |
            feature-cache-

      - name: Install dependencies
        if: steps.check.outputs.posted == 'false'
        run: pip install -r requirements.txt

      - name: Run predictions (self-heal)
        if: steps.check.outputs.posted == 'false'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python main.py --run-now

      - name: Commit recovered database and dashboard data
        if: steps.check.outputs.posted == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mlb_bets.db docs/data/
          git diff --cached --quiet || git commit -m "chore: predictions (watchdog recovery) $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3 4; do
            git pull --rebase -X theirs origin master && git push origin master && break
            echo "Push attempt $attempt failed, retrying in $((attempt * 2))s..."
            sleep $((attempt * 2))
          done

      - name: Report watchdog outcome to Discord
        if: steps.check.outputs.posted == 'false'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          MARKER=$(python3 -c "import json;print(json.load(open('docs/data/predict_status.json')).get('date',''))" 2>/dev/null || echo "")
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ "$MARKER" = "$TODAY" ]; then
            msg="✅ Watchdog recovered today's predictions (${TODAY}) — the scheduled runs had missed, picks are posted now."
          else
            msg="🚨 Predictions STILL missing for ${TODAY} after watchdog retry — likely an MLB/odds API outage. Manual check needed: ${run_url}"
          fi
          echo "$msg"
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -fsS -H "Content-Type: application/json" -d "{\"content\": \"${msg}\"}" "$DISCORD_WEBHOOK_URL" || true
          fi
