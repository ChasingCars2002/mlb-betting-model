name: One-shot Grade Backfill

# One-time backfill: grade the stale pending predictions (Apr 4, Apr 15, etc.)
# that the old yesterday-only grader never retried. Runs the now date-aware
# grader and commits the updated DB + dashboard to the branch. Push-triggered
# (API dispatch is blocked); idempotent (already-graded picks are skipped).
# Remove after it has run.

on:
  push:
    branches: [ "claude/predictions-not-posting-KIVES" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Backfill grading
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python main.py --grade

      - name: Report remaining pending
        run: |
          python - <<'PY'
          import sqlite3
          c = sqlite3.connect("mlb_bets.db"); c.row_factory = sqlite3.Row
          rows = c.execute("SELECT date, COUNT(*) n FROM predictions WHERE status='Pending' GROUP BY date").fetchall()
          if rows:
              print("Still pending after backfill:")
              for r in rows:
                  print(f"  {r['date']}: {r['n']}")
          else:
              print("No pending predictions remain.")
          PY

      - name: Commit graded DB and dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mlb_bets.db docs/data/
          git diff --cached --quiet || git commit -m "chore: backfill grade stale pending predictions $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3 4; do
            git pull --rebase -X ours origin claude/predictions-not-posting-KIVES && \
            git push origin HEAD:claude/predictions-not-posting-KIVES && break
            echo "push attempt $attempt failed"; sleep $((attempt*2))
          done
