name: Weekly Retrain

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Restore feature cache
        uses: actions/cache@v4
        with:
          path: models/cache
          key: feature-cache-${{ hashFiles('features.py') }}
          restore-keys: |
            feature-cache-

      - run: pip install -r requirements.txt

      - name: Retrain model
        run: python main.py --retrain

      - name: Commit updated models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/*.joblib models/training_state.json
          git diff --cached --quiet || (git commit -m "chore: retrain models $(date -u +%Y-%m-%d)" && git push)
