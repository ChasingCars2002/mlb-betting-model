name: Daily Predictions

on:
  schedule:
    # Target: post by 11:00 AM ET. (MLB season is entirely EDT, so 11:00 ET =
    # 15:00 UTC.) GitHub `schedule` crons are best-effort — at busy times
    # (especially the top/half of the hour) they are delayed by hours or DROPPED
    # entirely with no run created, which is how a day's predictions silently
    # fail to post. We therefore fire several times around the target at
    # off-peak, non-round minutes. The run is idempotent (see PREDICT_STATUS_FILE
    # in main.py), so once one attempt posts the later ones cheaply no-op.
    - cron: '4 15 * * *'    # ~11:04 ET — primary (the 11am target)
    - cron: '34 15 * * *'   # ~11:34 ET — backup if primary was dropped
    - cron: '19 16 * * *'   # ~12:19 ET — last-chance before most first pitches
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Restore feature cache
        uses: actions/cache@v4
        with:
          path: models/cache
          key: feature-cache-${{ hashFiles('features.py') }}
          restore-keys: |
            feature-cache-

      - run: pip install -r requirements.txt

      - name: Retrain if models are missing or feature schema changed
        run: |
          python -c "
          import json, hashlib, sys
          from pathlib import Path
          from features import FEATURE_COLUMNS
          cur = hashlib.sha256(','.join(FEATURE_COLUMNS).encode()).hexdigest()[:16]
          model_path = Path('models/xgboost.joblib')
          state_path = Path('models/training_state.json')
          if not model_path.exists():
              print('Models missing — retraining.')
              sys.exit(1)
          stored = json.loads(state_path.read_text()).get('feature_columns_hash', '') if state_path.exists() else ''
          if stored != cur:
              print(f'Feature schema changed ({stored!r} -> {cur!r}) — retraining.')
              sys.exit(1)
          print('Models are current, skipping retrain.')
          " || python main.py --retrain

      - name: Commit retrained models if schema changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/*.joblib models/training_state.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: retrain models (schema change) $(date -u +%Y-%m-%d)"

      - name: Run today's predictions
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python main.py --run-now

      - name: Commit updated database and dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mlb_bets.db docs/data/
          git diff --cached --quiet || git commit -m "chore: predictions $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3 4; do
            git pull --rebase -X theirs origin master && git push origin master && break
            echo "Push attempt $attempt failed, retrying in $((attempt * 2))s..."
            sleep $((attempt * 2))
          done

      - name: Notify on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # A dropped/never-created run can't alert (the redundant crons cover
          # that). This catches the other failure mode: a run that started but
          # crashed before posting, which would otherwise fail silently.
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            curl -fsS -H "Content-Type: application/json" \
              -d "{\"content\": \"🚨 **Daily Predictions failed** for $(date -u +%Y-%m-%d). A later scheduled run will retry. Logs: ${run_url}\"}" \
              "$DISCORD_WEBHOOK_URL" || true
          fi
